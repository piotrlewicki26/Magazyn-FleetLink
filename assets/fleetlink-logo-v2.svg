  <path d="M18 26.5 Q24 20 31 17" stroke="url(#iconGrad)" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M18 26.5 Q10 16 18 8" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round" fill="none" stroke-dasharray="1.5 2.5" opacity="0.7"/>
  <path d="M18 26.5 Q28 16 36 20" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round" fill="none" stroke-dasharray="1.5 2.5" opacity="0.7"/>
  <!-- FleetLink text -->
