<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>

    <!-- Marker gradient - electric blue to deep blue -->
    <linearGradient id="markerFill" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" stop-color="#38CFFF"/>
      <stop offset="55%" stop-color="#0A8FFF"/>
      <stop offset="100%" stop-color="#0050CC"/>
    </linearGradient>

    <!-- Marker inner highlight -->
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Text gradient Fleet -->
    <linearGradient id="fleetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C8DCF0"/>
    </linearGradient>

    <!-- Text gradient Link (accent) -->
    <linearGradient id="linkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5BE0FF"/>
      <stop offset="100%" stop-color="#0A8FFF"/>
    </linearGradient>

    <!-- Glow for marker -->
    <filter id="markerGlow" x="-50%" y="-30%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft text shadow -->
    <filter id="textShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#0A8FFF" flood-opacity="0.25"/>
    </filter>

    <!-- Glow rings filter -->
    <filter id="ringGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow drop under marker tip -->
    <radialGradient id="shadowGrad" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#0A8FFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0A8FFF" stop-opacity="0"/>
    </radialGradient>

  </defs>

  <!-- ===================== MAP MARKER ===================== -->
  <g transform="translate(54, 76)">

    <!-- Soft glow aura behind marker -->
    <ellipse cx="0" cy="0" rx="30" ry="32" fill="#0A8FFF" opacity="0.08"/>

    <!-- Ground shadow ellipse -->
    <ellipse cx="0" cy="60" rx="14" ry="4.5" fill="url(#shadowGrad)"/>

    <!-- Marker teardrop body -->
    <path d="M0,-56
             C26,-56 44,-36 44,-14
             C44,12 20,42 0,62
             C-20,42 -44,12 -44,-14
             C-44,-36 -26,-56 0,-56 Z"
          fill="url(#markerFill)"
          filter="url(#markerGlow)"/>

    <!-- Highlight shine on marker -->
    <path d="M0,-56
             C26,-56 44,-36 44,-14
             C44,12 20,42 0,62
             C-20,42 -44,12 -44,-14
             C-44,-36 -26,-56 0,-56 Z"
          fill="url(#innerGlow)"/>

    <!-- White circle ring -->
    <circle cx="0" cy="-14" r="18" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.9"/>

    <!-- Inner filled circle -->
    <circle cx="0" cy="-14" r="8" fill="#FFFFFF"/>

    <!-- Center dot -->
    <circle cx="0" cy="-14" r="3.5" fill="#0A8FFF"/>

    <!-- Crosshair lines -->
    <line x1="0" y1="-36" x2="0" y2="-26" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
    <line x1="0" y1="-2"  x2="0" y2="8"  stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
    <line x1="-22" y1="-14" x2="-12" y2="-14" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
    <line x1="12"  y1="-14" x2="22"  y2="-14" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.85"/>

  </g>

  <!-- ===================== SIGNAL RINGS (left of marker) ===================== -->
  <g transform="translate(54, 30)" filter="url(#ringGlow)" opacity="0.6" fill="none" stroke-linecap="round">
    <path d="M-14,-4 A18,18 0 0,1 14,-4" stroke="#38CFFF" stroke-width="1.8"/>
    <path d="M-22,-10 A28,28 0 0,1 22,-10" stroke="#38CFFF" stroke-width="1.4" opacity="0.7"/>
    <path d="M-30,-17 A38,38 0 0,1 30,-17" stroke="#38CFFF" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- ===================== FLEETLINK WORDMARK ===================== -->
  <text
    x="116" y="78"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="64"
    font-weight="800"
    letter-spacing="-3"
    filter="url(#textShadow)">
    <tspan fill="url(#fleetGrad)">Fleet</tspan><tspan fill="url(#linkGrad)">Link</tspan>
  </text>

  <!-- Accent bar under wordmark -->
  <rect x="116" y="87" width="308" height="2.5" rx="1.25">
    <animate attributeName="width" values="0;308" dur="1.2s" fill="freeze"/>
  </rect>
  <!-- Static fallback (no animation support) -->
  <rect x="116" y="87" width="308" height="2.5" rx="1.25" fill="url(#linkGrad)" opacity="0.55"/>

  <!-- ===================== SYSTEM GPS TAGLINE ===================== -->
  <text
    x="240" y="128"
    text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="19"
    font-weight="600"
    letter-spacing="9"
    fill="#6BBFDE"
    opacity="0.9">
    SYSTEM GPS
  </text>

</svg>
